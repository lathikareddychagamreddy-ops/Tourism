<!DOCTYPE html>
<html>
<head>
    <title>Indian Destinations - TravelWorld</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: white;
        }

        .header {
            background: rgb(4, 4, 109);
            color: white;
            text-align: center;
            padding: 20px;
        }

        .places {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    padding: 20px;
}
        .card {
    background: white;
    border-radius: 10px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    overflow: hidden;
}


        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 100%;
            height: 170px;
            object-fit: cover;
        }

        .card p {
            text-align: center;
            padding: 10px;
            font-weight: bold;
        }

        .back-btn {
            display: block;
            width: 150px;
            margin: 20px auto;
            padding: 10px;
            text-align: center;
            background: #8e24aa;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .back-btn:hover {
            background: #6a1b9a;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>Indian Destinations</h1>
    </div>

    <div class="places">

        <div class="card">
            <img src="https://media.istockphoto.com/id/1208049833/photo/amazing-view-on-the-taj-mahal-in-sunset-light-with-reflection-in-water-the-taj-mahal-is-an.jpg?s=612x612&w=0&k=20&c=rNo7Q1k7SSaH6T09HShS57X9dw2QkuRBcnP2dNxAGIE=">
            <p>Agra (Taj Mahal)</p>
        </div>

        <div class="card">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRK5HOq-yG0WerH77Xzbbl7hSwgj6LU-29THQ&s">
            <p>Jaipur(palaces)</p>
        </div>

        <div class="card">
            <img src="https://lp-cms-production.imgix.net/2025-04/shutterstock2454866115.jpg?auto=format,compress&q=72&w=1440&h=810&fit=crop">
            <p>Kerala (Backwaters)</p>
        </div>

        <div class="card">
            <img src="https://www.tourmyindia.com/states/goa/image/beaches-goa.webp">
            <p>Goa (Beaches)</p>
        </div>

        <div class="card">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSTIqB1vyvXc1j2dgPeVY8SwK1KcL7qp7X9ww&s">
            <p>Manali(Mountains)</p>
            </div>

        <div class="card">
            <img src="https://s7ap1.scene7.com/is/image/incredibleindia/manikarnika-ghat-city-hero?qlt=82&ts=1727959374496">
            <p>Varanasi (Spiritual)</p>
        </div>

        <div class="card">
            <img src="https://static.toiimg.com/photo/msid-51990254,width-96,height-65.cms">
            <p>Darjeeling(Hills)</p>
            </div>
        <div class="card">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSjrKXEpf3sT1VwJUNoXyu8psPESD598abCDA&s">
            <p>Ranthambore (Wildlife)</p>
        </div>

    </div>

    <a href="Tourism.html" class="back-btn">Back to Home</a>

</body>
</html>
